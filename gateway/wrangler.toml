name = "agent-gateway"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# KV namespace for rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "0c26c5d748f843eaa87ec150db55db75"

# Non-sensitive environment variables
[vars]
DISCORD_PUBLIC_KEY = "fbfd3b67002702bc67fd1c9c6172aaf72c610b0c4468a175d6ece25857768859"
DISCORD_APP_ID = "1489503541071712296"
ALLOWED_USERS = "1489456335618572378"

# Sensitive variables — set via `wrangler secret put <NAME>`
# DISCORD_BOT_TOKEN    - Bot token for REST API callbacks
# AGENT_HMAC_SECRET    - Shared HMAC signing secret with agent service
# AGENT_ENDPOINT       - Agent service URL (CF Tunnel address)
